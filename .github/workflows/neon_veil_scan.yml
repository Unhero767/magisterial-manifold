name: Neon_Veil Sector Scan
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  resonance-check:
    runs-on: ubuntu-latest
    steps:
      - name: 🌌 Manifesting Repository
        uses: actions/checkout@v4

      - name: 🧪 Stabilizing Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📜 Ingesting Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🕯️ Executing Terminal Ritual
        run: |
          python3 src/core/ml_cli.py --define-sector Neon_Veil --protocol Luminous_Static --path src
