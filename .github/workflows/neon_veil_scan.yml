name: 'Neon_Veil Sector Scan'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      purge_mode:
        description: 'Enable active quarantine?'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 🚀 Future-proofing the substrate

jobs:
  resonance-check:
    name: 🌌 Chromatic Resonance Ritual
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Manifesting Repository Artifacts
        uses: actions/checkout@v4

      - name: 🧪 Aligning to Local Resonance (Python 3.13)
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 📜 Ingesting Magisterial Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🕯️ Executing Terminal Ritual
        run: |
          python3 src/core/ml_cli.py --define-sector Neon_Veil --protocol Luminous_Static
