name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # Minimal test deps (safe even if you already have them)
          pip install pytest

      - name: Compile (sanity)
        run: |
          python -m compileall -q src || true

      - name: Run tests
        env:
          # Keep CI deterministic; do not require secrets just to run tests.
          GEMINI_API_KEY: ""
        run: |
          pytest -q

