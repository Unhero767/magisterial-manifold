version: '3.9'

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.13-community
    container_name: magisterial-loom-dev
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/magisterium_password_dev
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512M
    volumes:
      - neo4j_dev_data:/data
      - neo4j_dev_logs:/logs
      - ./neo4j/conf:/conf
    networks:
      - magisterium-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7474/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Magisterial Manifold Application
  manifold:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magisterial-manifold-dev
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=magisterium_password_dev
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src
      - ./archetypes:/app/archetypes
      - ./data:/app/data
      - ./protocols:/app/protocols
      - ./reports:/app/reports
      - ./hall_of_records:/app/hall_of_records
      - ./run_cypher.py:/app/run_cypher.py
      - ./verify_key.py:/app/verify_key.py
      - ./sync_lore.py:/app/sync_lore.py
      - ./test_mtp.py:/app/test_mtp.py
    depends_on:
      neo4j:
        condition: service_healthy
    command: python -m src.core.ml_cli
    networks:
      - magisterium-network

  # Test runner
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magisterial-test
    working_dir: /app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=magisterium_password_dev
      - PYTHONUNBUFFERED=1
    volumes:
      - ./tests:/app/tests
      - ./src:/app/src
    depends_on:
      neo4j:
        condition: service_healthy
    command: python -m pytest -v tests/
    networks:
      - magisterium-network
    profiles:
      - test

volumes:
  neo4j_dev_data:
  neo4j_dev_logs:

networks:
  magisterium-network:
    driver: bridge
