version: '3.9'

services:
  # Neo4j Graph Database (Production)
  neo4j:
    image: neo4j:5.13-community
    container_name: magisterial-loom-prod
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-magisterium_prod}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
      NEO4J_dbms_query_memory_limit: 512m
    volumes:
      - neo4j_prod_data:/data
      - neo4j_prod_logs:/logs
      - ./neo4j/conf:/conf
    networks:
      - magisterium-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7474/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Magisterial Manifold Application (Production)
  manifold:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magisterial-manifold-prod
    restart: unless-stopped
    working_dir: /app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-magisterium_prod}
      - PYTHONUNBUFFERED=1
    depends_on:
      neo4j:
        condition: service_healthy
    command: python -m src.core.ml_cli
    networks:
      - magisterium-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Batch test runner (periodic)
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magisterial-test-prod
    restart: unless-stopped
    working_dir: /app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-magisterium_prod}
      - PYTHONUNBUFFERED=1
    depends_on:
      neo4j:
        condition: service_healthy
    command: python -m pytest -v tests/
    networks:
      - magisterium-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - test

volumes:
  neo4j_prod_data:
  neo4j_prod_logs:

networks:
  magisterium-network:
    driver: bridge
